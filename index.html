<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Proje Takip Sistemi📌</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.min.js"></script>

  <style>
    /* GENEL TASARIM */
    body {
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
    }

    /* SOL KISIM: PROJELER VE GANTT CHART */
    #projects-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    /* GANTT CHART ALANI */
    #gantt-wrapper {
      background: #fff;
      border: 2px solid #000;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 30px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      overflow-x: auto; /* Geniş tarih aralıklarında kaydırılabilmesi için */
    }

    /* SAĞ KISIM: YENİ PROJE EKLEME PANELİ */
    #form-panel {
      width: 350px;
      background: #fff;
      padding: 20px;
      box-shadow: -2px 0 5px rgba(0,0,0,0.1);
      margin-left: auto;
      border-left: 4px solid #000;
      overflow-y: auto;
    }

    /* BAŞLIK */
    h1 {
      font-size: 28px;
      font-weight: bold;
      text-align: center;
      margin: 20px 0;
      color: #000;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* KART TASARIMI */
    .project-card {
      background: #fff;
      border: 2px solid #000;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      transition: all 0.3s ease;
      position: relative;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .project-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .projectnamebrand {
      text-shadow: 2px 2px 5px rgba(0,0,0,1.2);
    }

    .project-card h4 {
      margin: 5px 0;
      font-size: 20px;
      font-weight: bold;
      color: #111;
    }

    /* BUTONLAR */
    button {
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin: 5px 4px 0 0;
      transition: all 0.2s ease;
    }

    button:hover { opacity: 0.9; }
    .details-btn { background: #ffcc00; color: #000; }
    .delete-btn { background: #e53935; color: #fff; }

    /* DETAYLAR PANELİ */
    .project-details {
      margin-top: 12px;
      padding: 12px;
      border-top: 2px solid #000;
      background: #fafafa;
      display: none;
    }

    .project-details.open { display: block; }

    .note {
      font-size: 14px;
      padding: 6px 8px;
      margin-top: 6px;
      border-left: 4px solid #1976d2;
      background: #fff;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: 2px solid #000;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
    }
    .project-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .profile {
      display: flex;
      align-items: center;
      margin-top: 10px;
    }

    /* Frappe Gantt'ın senin siyah-beyaz retro temana uyması için küçük stil özelleştirmesi */
    .gantt .bar { fill: #ffcc00 !important; }
    .gantt .bar-progress { fill: #000000 !important; }

    @media (max-width: 900px) {
      body { flex-direction: column; }
      #form-panel { width: 100%; border-left: none; border-top: 4px solid #000; }
    }
  </style>
</head>
<body>

  <div id="projects-area">
    <header style="font-size:40px; margin-bottom: 20px;"> 
      <img src="logo.png" height="60" style="vertical-align: middle;"> Proje Takip Sistemi
    </header>

    <div id="gantt-wrapper">
      <h3 style="margin-top: 0;">📊 Proje Zaman Planı (Gantt Chart)</h3>
      <div id="gantt-chart"></div>
    </div>

    <div id="projects"></div>
  </div>

  <div id="form-panel">
    <h3>Yeni Proje Ekle</h3>
    <input id="title" placeholder="Proje Başlığı"><br>
    <textarea id="description" placeholder="Proje Açıklaması"></textarea><br>
    <label>Başlangıç Tarihi</label>
    <input type="date" id="startDate">
    <label>Bitiş Tarihi</label>
    <input type="date" id="endDate">
    <select id="type">
      <option value="3D Tasarım">3D Tasarım</option>
      <option value="Tersine Mühendislik">Tersine Mühendislik</option>
      <option value="Prototipleme">Prototipleme</option>
    </select>
    <input id="addedBy" placeholder="Ekleyen Kişi">
    <button onclick="addProject()" style="background: #000; color: #fff;">Kaydet</button>
    <button onclick="window.location.href='/services.html'" style="background: #ccc; color: #000;">
      Diğer Hizmetlerimiz
    </button>
  </div>

  <script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCxwXtrXxHbC_LcIlbK_PRIQ4v5pXt1l6w",
        authDomain: "atolye1886projectmanagement.firebaseapp.com",
        databaseURL: "https://atolye1886projectmanagement-default-rtdb.firebaseio.com",
        projectId: "atolye1886projectmanagement",
        storageBucket: "atolye1886projectmanagement.firebasestorage.app",
        messagingSenderId: "852948318375",
        appId: "1:852948318375:web:609dd6544580d7d6430382"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function randomColor() {
      const colors = ["#ef4444","#f59e0b","#10b981","#3b82f6","#8b5cf6","#ec4899"];
      return colors[Math.floor(Math.random()*colors.length)];
    }

    function addProject() {
      const project = {
        title: document.getElementById("title").value,
        description: document.getElementById("description").value,
        startDate: document.getElementById("startDate").value,
        endDate: document.getElementById("endDate").value,
        type: document.getElementById("type").value,
        addedBy: document.getElementById("addedBy").value,
        avatarColor: randomColor(),
        createdAt: Date.now(),
        notes: {}
      };
      db.ref("projects").push(project);
      document.querySelectorAll("#form-panel input, #form-panel textarea").forEach(el=>el.value="");
    }

    function uploadProposal(id) {
      let link = prompt("Teklif linkini girin:");
      if (link) {
        if (!link.startsWith("http://") && !link.startsWith("https://")) link = "https://" + link;
        db.ref("projects/" + id).update({ proposal: link });
      }
    }

    function uploadInvoice(id) {
      let link = prompt("Fatura linkini girin:");
      if (link) {
        if (!link.startsWith("http://") && !link.startsWith("https://")) link = "https://" + link;
        db.ref("projects/" + id).update({ invoice: link });
      }
    }

    function renderProjects(snapshot) {
      const projectsDiv = document.getElementById("projects");
      projectsDiv.innerHTML = "";
      let projects = [];
      
      // Gantt için boş bir array tanımlıyoruz
      let ganttTasks = [];

      snapshot.forEach(child => {
        projects.push({ id: child.key, ...child.val() });
      });
      
      // Kartları oluşturma sırası (Yeniden eskiye)
      projects.sort((a,b)=>b.createdAt - a.createdAt);

      projects.forEach(p=>{
        // GANTT ARRAY'INE EKLEME: Eğer projenin geçerli tarihleri varsa grafiğe ekle
        if (p.startDate && p.endDate) {
          ganttTasks.push({
            id: p.id,
            name: p.title || "İsimsiz Proje",
            start: p.startDate,
            end: p.endDate,
            progress: 60 // Eski veriler olduğu için sabit bir doluluk oranı verdik, dilersen dinamik yapabilirsin
          });
        }

        // Kart Arayüzü Çizimi (Senin orijinal kodun)
        const card = document.createElement("div");
        card.className = "project-card";
        card.innerHTML = `
          <div class="project-header">
            <h1 class="projectnamebrand">📌</h1>
            <button class="details-btn" onclick="toggleDetails('${p.id}')">Detaylar</button>
          </div>
          <h4>${p.title}</h4>
          <div class="project-details" id="details-${p.id}">
            <p><b>Açıklama:</b> ${p.description}</p>
            <p><b>Tür:</b> ${p.type}</p>
            <p><b>Başlangıç:</b> ${p.startDate} | <b>Bitiş:</b> ${p.endDate}</p>
            <p><b>Teklif:</b> ${p.proposal ? `<a href="${p.proposal}" target="_blank">Link</a>` : `<button onclick="uploadProposal('${p.id}')">📤 Yükle</button>`}</p>
            <p><b>Fatura:</b> ${p.invoice ? `<a href="${p.invoice}" target="_blank">Link</a>` : `<button onclick="uploadInvoice('${p.id}')">📤 Yükle</button>`}</p>
            <div id="notes-${p.id}"></div>
            <input id="noteInput-${p.id}" placeholder="Not ekle..." style="width:70%">
            <button onclick="addNote('${p.id}')">Ekle</button>
            <button class="delete-btn" onclick="deleteProject('${p.id}')">❌ Sil</button>
            <div class="profile">
              <div class="avatar" style="background:${p.avatarColor}"></div>
              <strong>${p.addedBy}</strong>
            </div>
          </div>
        `;

        if (p.notes) {
          Object.values(p.notes).forEach(n=>{
            const noteDiv = document.createElement("div");
            noteDiv.className="note";
            noteDiv.innerText=`${n.date} - ${n.text}`;
            card.querySelector(`#notes-${p.id}`).appendChild(noteDiv);
          });
        }
        projectsDiv.appendChild(card);
      });

      // GANTT CHART'I ÇİZDİRME AYARI
      // Eğer veritabanında tarihli en az 1 proje varsa grafiği render et
      if (ganttTasks.length > 0) {
        document.getElementById("gantt-wrapper").style.display = "block";
        document.getElementById("gantt-chart").innerHTML = ""; // Önceki grafiği temizle
        
        const gantt = new Gantt("#gantt-chart", ganttTasks, {
          header_height: 50,
          column_width: 30,
          step: 24,
          view_modes: ['Quarter Day', 'Half Day', 'Day', 'Week', 'Month'],
          view_mode: 'Week', // Varsayılan görünüm: Haftalık
          language: 'tr' // Türkçe dil desteği
        });
      } else {
        // Eğer hiç tarihli proje yoksa alanı gizle
        document.getElementById("gantt-wrapper").style.display = "none";
      }
    }

    function toggleDetails(id) {
      const d = document.getElementById(`details-${id}`);
      d.classList.toggle("open");
    }

    function addNote(id) {
      const input = document.getElementById(`noteInput-${id}`);
      const text = input.value;
      if (!text) return;
      const note = { text, date: new Date().toLocaleString() };
      db.ref("projects/"+id+"/notes").push(note);
      input.value="";
    }

    function deleteProject(id) {
      if (confirm("Bu projeyi silmek istediğine emin misin?")) {
        db.ref("projects/"+id).remove();
      }
    }

    db.ref("projects").on("value", renderProjects);
  </script>
</body>
</html>
